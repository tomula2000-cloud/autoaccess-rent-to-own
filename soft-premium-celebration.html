<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soft Premium Celebration</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #f8fafc, #eef2f7);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }

    .card {
      position: relative;
      width: min(92%, 760px);
      min-height: 460px;
      border-radius: 28px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(255, 255, 255, 0.95);
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .effect-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      max-width: 560px;
      padding: 40px 28px;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
      background: rgba(255, 255, 255, 0.9);
      color: #475569;
      border: 1px solid rgba(255, 255, 255, 0.98);
      box-shadow: 0 4px 18px rgba(15, 23, 42, 0.05);
    }

    h1 {
      font-size: clamp(34px, 5vw, 54px);
      line-height: 1.08;
      color: #0f172a;
      margin-bottom: 14px;
    }

    p {
      font-size: 16px;
      line-height: 1.7;
      color: #475569;
      margin: 0 auto 26px;
    }

    .highlight {
      color: #0f172a;
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.96;
    }

    .btn-primary {
      background: #0f172a;
      color: white;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.72);
      color: #0f172a;
      border: 1px solid rgba(15, 23, 42, 0.08);
    }

    .spark-ribbon {
      position: absolute;
      top: -80px;
      width: 6px;
      height: 70px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.75);
      box-shadow:
        0 0 10px rgba(255, 255, 255, 0.45),
        0 0 24px rgba(255, 255, 255, 0.2);
      animation: sparkleFloat linear infinite;
    }

    .spark-ribbon::before,
    .spark-ribbon::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
    }

    .spark-ribbon::before {
      width: 8px;
      height: 8px;
      top: -10px;
      left: -1px;
    }

    .spark-ribbon::after {
      width: 5px;
      height: 5px;
      bottom: -8px;
      right: 0;
    }

    @keyframes sparkleFloat {
      0% {
        transform: translateY(-80px) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      50% {
        transform: translateY(180px) translateX(12px) rotate(100deg);
      }
      100% {
        transform: translateY(620px) translateX(-10px) rotate(220deg);
        opacity: 0.05;
      }
    }

    @media (max-width: 560px) {
      .card {
        min-height: 420px;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }

      p {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <section class="card">
    <div class="effect-layer" id="effect"></div>

    <div class="content">
      <div class="badge">Application Approved</div>
      <h1>Congratulations!</h1>
      <p>
        Your application has been successfully approved.
        <span class="highlight">You may now proceed to the next step.</span>
      </p>

      <div class="actions">
        <a href="#" class="btn btn-primary">Continue</a>
        <a href="#" class="btn btn-secondary">View Details</a>
      </div>
    </div>
  </section>

  <script>
    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createSparkRibbons(containerId, count) {
      const container = document.getElementById(containerId);

      for (let i = 0; i < count; i++) {
        const el = document.createElement("span");
        el.className = "spark-ribbon";
        el.style.left = `${random(0, 100)}%`;
        el.style.height = `${random(55, 95)}px`;
        el.style.width = `${random(4, 7)}px`;
        el.style.opacity = random(0.4, 0.95);
        el.style.animationDuration = `${random(4.2, 7.2)}s`;
        el.style.animationDelay = `${random(0, 4)}s`;
        container.appendChild(el);
      }
    }

    createSparkRibbons("effect", 24);
  </script>
</body>
</html>
